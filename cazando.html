<!DOCTYPE html>
<html>

<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css">
</head>

<body onload="iniciarJuego()">

  <h1>JUEGO CAZANDO</h1>
  <p>Autor: DAVID ATTI</p>

  <canvas id="areaJuego" width="500" height="500"></canvas>

  <div class="controles">
    <button id="btnArriba">⬆ Arriba</button>
    <br>
    <button id="btnIzquierda">⬅ Izquierda</button>
    <button id="btnAbajo">⬇ Abajo</button>
    <button id="btnDerecha">➡ Derecha</button>
  </div>

  <div class="panel">
    <span>Puntos: <span id="puntos">0</span></span>
    <span>Tiempo: <span id="tiempo">10</span></span>
  </div>

  <!-- NUEVO BOTÓN REINICIAR -->
  <div class="reiniciar">
    <button id="btnReiniciar">🔄 Reiniciar Juego</button>
  </div>

  <p id="mensaje"></p>
  
  <script src="utils.js"></script>
  <script src="cazando.js"></script>
</body>

</html>
